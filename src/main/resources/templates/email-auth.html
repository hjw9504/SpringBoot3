<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>JUNGS 이메일 인증</title>
  <style>
    /* ── 다크 모드 ── */
    @media (prefers-color-scheme: dark) {
      body, .outer-wrap  { background-color: #111827 !important; }
      .card              { background-color: #1f2937 !important; }
      .body-text         { color: #e5e7eb !important; }
      .sub-text          { color: #9ca3af !important; }
      .code-box          { background: #292524 !important; border-color: #78350f !important; }
      .code-label        { color: #fb923c !important; }
      .code-value        { color: #ffffff !important; }
      .expire-box        { background-color: #292524 !important; border-color: #78350f !important; }
      .expire-text       { color: #fdba74 !important; }
      .security-box      { background-color: #1f2937 !important; border-color: #374151 !important; }
      .security-title    { color: #e5e7eb !important; }
      .security-text     { color: #9ca3af !important; }
      .footer-wrap       { background-color: #1f2937 !important; border-color: #374151 !important; }
      .footer-brand      { color: #e5e7eb !important; }
      .footer-copy       { color: #6b7280 !important; }
      .footer-link       { color: #fb923c !important; }
    }
  </style>
</head>
<body class="outer-wrap" style="margin:0;padding:0;background-color:#f3f4f6;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" class="outer-wrap" style="background-color:#f3f4f6;min-height:100vh;">
  <tr>
    <td align="center" style="padding:40px 16px;">

      <table width="100%" cellpadding="0" cellspacing="0" border="0" class="card" style="max-width:560px;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

        <!-- ── 헤더 ── -->
        <tr>
          <td style="background:linear-gradient(135deg,#f97316 0%,#ea580c 50%,#c2410c 100%);padding:40px 40px 36px;text-align:center;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">

              <!-- 브랜드 로고 -->
              <tr>
                <td align="center" style="padding-bottom:20px;">
                  <span style="font-size:36px;font-weight:900;color:#ffffff;letter-spacing:-1px;text-shadow:0 2px 8px rgba(0,0,0,0.15);">JUNGS</span>
                </td>
              </tr>

              <!-- 자물쇠 아이콘 -->
              <tr>
                <td align="center" style="padding-bottom:20px;">
                  <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="width:72px;height:72px;background-color:rgba(255,255,255,0.2);border-radius:50%;text-align:center;vertical-align:middle;border:2px solid rgba(255,255,255,0.5);">
                        <span style="font-size:34px;line-height:72px;display:block;">🔐</span>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- 타이틀 -->
              <tr>
                <td align="center">
                  <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">이메일 인증</p>
                  <p style="margin:8px 0 0;font-size:14px;color:rgba(255,255,255,0.85);">아래 인증 코드를 입력해주세요 ✉️</p>
                </td>
              </tr>

            </table>
          </td>
        </tr>

        <!-- ── 본문 ── -->
        <tr>
          <td style="padding:36px 40px 28px;">

            <!-- 안내 문구 -->
            <p style="margin:0 0 28px;font-size:15px;line-height:1.7;text-align:center;" class="sub-text" style="color:#6b7280;">
              JUNGS 이메일 인증을 위한 인증 코드입니다.<br/>
              코드는 <strong style="color:#ea580c;">10분간</strong> 유효합니다.
            </p>

            <!-- 인증 코드 박스 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
              <tr>
                <td align="center">
                  <table cellpadding="0" cellspacing="0" border="0"
                         class="code-box"
                         style="background:linear-gradient(135deg,#fff7ed 0%,#ffedd5 100%);border-radius:16px;border:2px solid #fed7aa;">
                    <tr>
                      <td style="padding:28px 56px;text-align:center;">
                        <p style="margin:0 0 8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;" class="code-label" style="color:#f97316;">인증 코드</p>
                        <p th:text="${authCode}"
                           style="margin:0;font-size:44px;font-weight:900;letter-spacing:12px;font-variant-numeric:tabular-nums;"
                           class="code-value" style="color:#c2410c;">
                          00000
                        </p>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <!-- 만료 안내 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
              <tr>
                <td class="expire-box"
                    style="background-color:#fff7ed;border-radius:10px;border:1px solid #fed7aa;padding:14px 20px;text-align:center;">
                  <p style="margin:0;font-size:13px;line-height:1.6;" class="expire-text" style="color:#c2410c;">
                    ⏱️ 이 코드는 발송 후 <strong>10분 이내</strong>에 사용해야 합니다.
                  </p>
                </td>
              </tr>
            </table>

            <!-- 보안 안내 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                   class="security-box"
                   style="background-color:#f9fafb;border-radius:12px;border:1px solid #e5e7eb;">
              <tr>
                <td style="padding:18px 22px;">
                  <p style="margin:0 0 6px;font-size:13px;font-weight:700;" class="security-title" style="color:#374151;">🔒 보안 안내</p>
                  <p style="margin:0;font-size:13px;line-height:1.7;" class="security-text" style="color:#6b7280;">
                    본인이 요청하지 않은 인증 코드라면 즉시 고객센터로 문의해주세요.<br/>
                    인증 코드는 절대 타인에게 공유하지 마세요.
                  </p>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- ── 푸터 ── -->
        <tr>
          <td class="footer-wrap" style="background-color:#f9fafb;border-top:1px solid #e5e7eb;padding:24px 40px;text-align:center;">
            <p style="margin:0 0 4px;font-size:13px;font-weight:700;" class="footer-brand" style="color:#374151;">JUNGS</p>
            <p style="margin:0 0 12px;font-size:12px;line-height:1.6;" class="footer-copy" style="color:#9ca3af;">
              본 메일은 발신 전용입니다. 문의사항은 고객센터를 이용해주세요.<br/>
              © 2025 JUNGS. All rights reserved.
            </p>
            <p style="margin:0;font-size:12px;">
              <a th:href="${siteUrl}" href="#" class="footer-link" style="color:#ea580c;text-decoration:none;font-weight:500;">홈페이지</a>
              &nbsp;&nbsp;|&nbsp;&nbsp;
              <a th:href="${siteUrl + '/reset/password'}" href="#" class="footer-link" style="color:#ea580c;text-decoration:none;font-weight:500;">비밀번호 재설정</a>
            </p>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>

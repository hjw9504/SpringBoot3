<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>JUNGS 이메일 인증</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f3f4f6;min-height:100vh;">
  <tr>
    <td align="center" style="padding:40px 16px;">

      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

        <!-- ── 헤더 ── -->
        <tr>
          <td style="background:linear-gradient(135deg,#fb923c 0%,#f43f5e 50%,#e11d48 100%);padding:40px 40px 36px;text-align:center;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">

              <!-- 브랜드 로고 -->
              <tr>
                <td align="center" style="padding-bottom:20px;">
                  <span style="font-size:36px;font-weight:900;color:#ffffff;letter-spacing:-1px;text-shadow:0 2px 8px rgba(0,0,0,0.15);">JUNGS</span>
                </td>
              </tr>

              <!-- 자물쇠 아이콘 -->
              <tr>
                <td align="center" style="padding-bottom:20px;">
                  <table cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="width:72px;height:72px;background-color:rgba(255,255,255,0.2);border-radius:50%;text-align:center;vertical-align:middle;border:2px solid rgba(255,255,255,0.5);">
                        <span style="font-size:34px;line-height:72px;display:block;">🔐</span>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- 타이틀 -->
              <tr>
                <td align="center">
                  <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">이메일 인증</p>
                  <p style="margin:8px 0 0;font-size:14px;color:rgba(255,255,255,0.85);">아래 인증 코드를 입력해주세요 ✉️</p>
                </td>
              </tr>

            </table>
          </td>
        </tr>

        <!-- ── 본문 ── -->
        <tr>
          <td style="padding:36px 40px 28px;">

            <!-- 안내 문구 -->
            <p style="margin:0 0 28px;font-size:15px;color:#6b7280;line-height:1.7;text-align:center;">
              JUNGS 이메일 인증을 위한 인증 코드입니다.<br/>
              코드는 <strong style="color:#f43f5e;">10분간</strong> 유효합니다.
            </p>

            <!-- 인증 코드 박스 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
              <tr>
                <td align="center">
                  <table cellpadding="0" cellspacing="0" border="0"
                         style="background:linear-gradient(135deg,#fff7ed 0%,#fff1f2 100%);border-radius:16px;border:2px solid #fed7aa;">
                    <tr>
                      <td style="padding:28px 56px;text-align:center;">
                        <p style="margin:0 0 8px;font-size:12px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:1px;">인증 코드</p>
                        <p th:text="${authCode}"
                           style="margin:0;font-size:44px;font-weight:900;color:#e11d48;letter-spacing:12px;font-variant-numeric:tabular-nums;">
                          00000
                        </p>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <!-- 만료 안내 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
              <tr>
                <td align="center"
                    style="background-color:#fef3c7;border-radius:10px;border:1px solid #fde68a;padding:14px 20px;">
                  <p style="margin:0;font-size:13px;color:#92400e;line-height:1.6;">
                    ⏱️ 이 코드는 발송 후 <strong>10분 이내</strong>에 사용해야 합니다.
                  </p>
                </td>
              </tr>
            </table>

            <!-- 보안 안내 -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                   style="background-color:#f9fafb;border-radius:12px;border:1px solid #e5e7eb;">
              <tr>
                <td style="padding:18px 22px;">
                  <p style="margin:0 0 6px;font-size:13px;font-weight:700;color:#374151;">🔒 보안 안내</p>
                  <p style="margin:0;font-size:13px;color:#6b7280;line-height:1.7;">
                    본인이 요청하지 않은 인증 코드라면 즉시 고객센터로 문의해주세요.<br/>
                    인증 코드는 절대 타인에게 공유하지 마세요.
                  </p>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- ── 푸터 ── -->
        <tr>
          <td style="background-color:#f9fafb;border-top:1px solid #e5e7eb;padding:24px 40px;text-align:center;">
            <p style="margin:0 0 4px;font-size:13px;font-weight:700;color:#374151;">JUNGS</p>
            <p style="margin:0 0 12px;font-size:12px;color:#9ca3af;line-height:1.6;">
              본 메일은 발신 전용입니다. 문의사항은 고객센터를 이용해주세요.<br/>
              © 2025 JUNGS. All rights reserved.
            </p>
            <p style="margin:0;font-size:12px;">
              <a th:href="${siteUrl}" href="#" style="color:#f97316;text-decoration:none;font-weight:500;">홈페이지</a>
              &nbsp;&nbsp;|&nbsp;&nbsp;
              <a th:href="${siteUrl + '/reset/password'}" href="#" style="color:#f97316;text-decoration:none;font-weight:500;">비밀번호 재설정</a>
            </p>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>

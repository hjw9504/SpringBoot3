# 1. 워크플로우의 이름 (GitHub Actions 탭에 표시됨)
name: Auth Server CD (Develop Branch)

# 2. 실행 조건 (이벤트 트리거)
on:
  push:
    branches: [ "develop" ] # develop 브랜치에 코드가 push될 때만 실행

# 3. 실제 수행할 작업 단위
jobs:
  deploy-job:
    # 실행 환경 (GitHub이 제공하는 가상 우분투 서버)
    runs-on: ubuntu-latest

    steps:
      # [Step 1] GitHub 서버로 소스 코드 복제
      - name: Checkout Repository
        uses: actions/checkout@v4

      # [Step 2] Java 21 환경 설정 (빌드 검증용)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # 가장 안정적인 오픈 JDK 배포판

      # [Step 3] Gradle 빌드 (Jar 파일 생성 및 오류 검사)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test 
        # -x test: 배포 속도를 위해 테스트는 제외 (필요 시 제거)

      # [Step 4] EC2 원격 접속 및 배포 스크립트 실행
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # SSH 접속 후 EC2 터미널에서 실행할 명령어들
          script: |
            echo "Successfully connected to EC2!"
            
            # 1. 프로젝트 폴더로 이동 (본인의 경로에 맞게 수정)
            cd ~/
            
            # 2. 배포 스크립트에 실행 권한 부여
            chmod +x deploy-spring.sh
            
            # 3. 스크립트 실행 (기존 도커 삭제 -> 빌드 -> 실행)
            ./deploy-spring.sh
